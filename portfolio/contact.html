<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Abhinav Kumar Rath</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="glow-blob"></div>
    <div id="noise"></div>

    <nav class="navbar">
        <div class="nav-brand">AKR</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="skills.html">Skills</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <div class="container contact-wrapper">
        
        <div class="fade-up visible contact-header">
            <h1>Establish Connection</h1>
            <p>> Awaiting secure transmission...</p>
        </div>

        <div class="terminal-card fade-up visible">
            <form action="https://formspree.io/f/mjgabjrq" method="POST" class="contact-form">
                
                <div class="form-group">
                    <label for="name">Alias / Name</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your designation...">
                </div>

                <div class="form-group">
                    <label for="email">Return Address (Email)</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email...">
                </div>

                <div class="form-group">
                    <label for="message">Encrypted Transmission (Message)</label>
                    <textarea id="message" name="message" rows="5" required placeholder="Type your message here..."></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-paper-plane" style="margin-right: 10px;"></i> Transmit Message
                </button>
            </form>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
